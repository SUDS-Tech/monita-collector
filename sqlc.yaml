version: "2"
sql:
  - engine: "postgresql"
    schema: "pkg/db/migrations"
    queries: "pkg/db/queries"
    gen:
      go:
        package: "dbsqlc"
        out: "pkg/db/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type: "*time.Time"
